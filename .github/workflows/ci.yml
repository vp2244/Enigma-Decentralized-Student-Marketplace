name: CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install deps (forge-std + OpenZeppelin)
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv
      - name: Gas report (non-blocking)
        run: forge test --gas-report || true
