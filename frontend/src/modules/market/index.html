<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Buy · Escrow · Ratings · Marketplace</title>
<link rel="stylesheet" href="../../shared/layout.css"/></head>
<body>
<header class="enigma-header"><h1>3 · Buy · Escrow · Ratings <span class="owner">member3</span></h1>
  <p class="scenario">Buy (approve → escrow), confirm delivery to release funds, cancel after timeout to refund, then rate the seller.</p>
  <label class="netrow">Network: <select id="net" class="net"></select></label></header>
<main><div class="card">
  <button id="connect">Connect wallet</button>
  <p id="who" class="muted"></p>
  <input id="id" placeholder="listing id (e.g. 0)"/>
  <h3>Buy (2 steps: approve + purchase)</h3>
  <button id="buy">Buy</button>
  <h3>After receiving the item</h3>
  <button id="confirm">Confirm delivery</button>
  <button id="cancel" class="secondary">Cancel (after timeout)</button>
  <h3>Rate the seller</h3>
  <input id="stars" placeholder="rating 1–5"/>
  <button id="rate" class="secondary">Submit rating</button>
  <button id="avg" class="secondary">Show seller avg</button>
  <pre id="out" class="out"></pre>
</div></main>
<script type="module" src="market.js"></script></body></html>
